<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>주식 고급 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#050810;--c2:#080d18;--border:#1e2c48;
--green:#00e676;--red:#ff4d6d;--yellow:#ffd166;--blue:#4db8ff;
--purple:#c084fc;--orange:#f9a825;--cyan:#78c1ff}
body{background:var(--bg);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
color:#fff;max-width:480px;margin:0 auto;padding-bottom:60px;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* HEADER */
.hdr{background:linear-gradient(180deg,#0c1022,#050810);border-bottom:1px solid var(--border);
padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-lbl{font-size:11px;color:#6dcfff;letter-spacing:2px;margin-bottom:2px;font-family:monospace}
.hdr-title{font-size:19px;font-weight:900}
.hdr-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.badge{font-size:12px;background:#ffffff08;border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:#aabbcc}
.btn{display:inline-flex;align-items:center;gap:5px;border-radius:11px;padding:8px 14px;
font-size:12px;font-weight:900;cursor:pointer;border:none;transition:all .2s}
.btn-g{background:linear-gradient(135deg,#071a0e,#0c2418);border:1px solid #00e67645;color:var(--green)}
.btn-g:disabled{background:#0a1410;border-color:#1e3020;color:#2a4030;cursor:not-allowed}
.spin{display:inline-block;animation:spin .8s linear infinite}
.prog-wrap{height:3px;background:#1e2c48;border-radius:2px;margin-top:9px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px;transition:width .5s ease}

/* MAIN */
.main{padding:12px}
.start{text-align:center;padding:60px 20px;animation:up .3s ease}
.loading{text-align:center;padding:50px 0}
.spinner{width:44px;height:44px;border:3px solid #4a5a74;border-radius:50%;
animation:spin .7s linear infinite;margin:0 auto 14px}
.ld-title{font-size:14px;font-weight:700;margin-bottom:6px}
.ld-sub{font-size:11px;color:#7a9abc;line-height:1.9}
.proxy-st{font-size:12px;color:#7a9abc;margin-top:5px}
.err-box{background:#130408;border:1px solid #ff4d6d28;border-radius:12px;padding:14px;margin-bottom:12px}
.err-title{color:var(--red);font-size:13px;font-weight:800;margin-bottom:6px}
.err-msg{color:#a0b0c8;font-size:11px;line-height:1.7;margin-bottom:10px;white-space:pre-wrap;word-break:break-all}

/* CARD */
.card{margin-bottom:20px;animation:up .3s ease}
.c-hdr{background:linear-gradient(135deg,#0f1830,#192040);border:1px solid var(--border);
border-bottom:none;border-radius:14px 14px 0 0;padding:12px 14px 10px}
.c-code{font-size:11px;color:#7a9abc;font-family:monospace;margin-bottom:2px}
.c-name{font-size:20px;font-weight:900}
.c-body{background:#060a14;border:1px solid var(--border);border-top:none;
border-radius:0 0 14px 14px;padding:10px}

/* SECTION */
.sec{border-radius:0 10px 10px 0;padding:11px 13px;margin-bottom:9px;background:var(--c2)}
.sec-ttl{font-size:11px;font-weight:800;letter-spacing:.3px;margin-bottom:9px;
display:flex;gap:4px;align-items:center}
.sec-sub{font-size:11px;color:#7a9abc;letter-spacing:1px;margin:8px 0 5px;text-transform:uppercase}

/* PRICE */
.p-row{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.p-big{font-size:30px;font-weight:900;font-family:monospace;letter-spacing:-2px;line-height:1}
.p-chg{font-size:12px;font-weight:700;padding-bottom:2px}
.grid2{display:flex;gap:7px;margin-bottom:7px}
.grid3{display:flex;gap:6px;margin-bottom:7px}
.cell{flex:1;background:#0a0f1c;border-radius:8px;padding:6px 8px}
.cell-lbl{font-size:11px;color:#7a9abc;margin-bottom:2px}
.cell-val{font-size:11px;font-weight:700;font-family:monospace}
.src{font-size:11px;color:#7a9abc;display:flex;gap:3px;align-items:center;margin-top:6px}

/* SIGNAL SCORE BAR */
.score-wrap{margin-bottom:10px}
.score-bar-bg{height:8px;background:#151a28;border-radius:4px;position:relative;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.score-labels{display:flex;justify-content:space-between;margin-top:3px}
.score-labels span{font-size:11px;color:#8090b0}

/* RSI */
.rsi-bar-bg{position:relative;height:5px;background:#151a28;border-radius:3px}
.rsi-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.rsi-hint{display:flex;justify-content:space-between;margin-top:2px}
.rsi-hint span{font-size:11px;color:#8090b0}

/* IND GRID */
.ind-grid{display:flex;gap:6px;margin-bottom:5px}
.ind-cell{flex:1;background:#0a0f1c;border-radius:7px;padding:7px 4px;text-align:center}
.ind-lbl{font-size:11px;color:#8090b0;margin-bottom:2px}
.ind-val{font-size:11px;font-weight:700;font-family:monospace}

/* IROW */
.irow{display:flex;justify-content:space-between;align-items:flex-start;
padding:5px 0;border-bottom:1px solid #111928;gap:6px}
.irow-lbl{font-size:12px;color:#80a0c8;min-width:90px;flex-shrink:0;padding-top:1px}
.irow-r{text-align:right}
.irow-val{font-size:12px;font-weight:700;font-family:monospace}
.irow-cmt{font-size:12px;color:#7090b0;margin-top:1px;line-height:1.35}

/* OPINION */
.op-box{display:inline-flex;align-items:center;gap:12px;border-radius:11px;padding:10px 24px}
.op-ico{font-size:26px}
.op-txt{font-size:26px;font-weight:900;letter-spacing:3px}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{flex:1;min-width:74px;border-radius:9px;padding:8px 6px;text-align:center}
.chip-lbl{font-size:11px;margin-bottom:2px;opacity:.7}
.chip-val{font-size:13px;font-weight:800;font-family:monospace}
.chip-note{font-size:11px;color:#80a0c8;margin-top:2px}

/* PATTERN TAGS */
.pattern-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.ptag{font-size:12px;border-radius:20px;padding:3px 9px;font-weight:700}

/* CONTRARIAN BOX */
.contra-box{border-radius:9px;padding:9px 11px;margin-bottom:8px}
.contra-title{font-size:12px;font-weight:800;margin-bottom:4px;display:flex;gap:5px;align-items:center}
.contra-txt{font-size:11px;color:#a0b0c8;line-height:1.5}

/* FOREIGN */
.for-box{border-radius:7px;padding:8px 11px;margin-bottom:8px}
.for-row{display:flex;justify-content:space-between;margin-bottom:3px}
.for-lbl{font-size:12px;color:#80a0c8}
.for-trend{font-size:11px;font-weight:700}
.for-cmt{font-size:11px;color:#8a9ab6;line-height:1.5}

/* BULLETS */
.bul{display:flex;gap:7px;margin-bottom:6px}
.bul-dot{flex-shrink:0;line-height:1.6;font-size:11px}
.bul-txt{font-size:11px;color:#a0b0c8;line-height:1.6}

.neutral-msg{font-size:11px;color:#a0b0c0;line-height:1.7}
.footer{text-align:center;font-size:12px;color:#4a5a74;line-height:1.9;padding:4px 0 8px;margin-top:4px}

/* FEAR GAUGE */
.fear-wrap{margin-bottom:8px}
.fear-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,#00e676,#ffd166,#ff4d6d);
position:relative;margin:5px 0 3px}
.fear-needle{position:absolute;top:-3px;width:2px;height:12px;background:#fff;border-radius:1px;transform:translateX(-50%)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-lbl">KRX · ADVANCED AI ANALYSIS v2.0</div>
      <div class="hdr-title">국내 주식 고급 분석</div>
    </div>
    <button class="btn btn-g" id="mainBtn" onclick="startAnalysis()">
      <span id="btnIcon">✦</span>
      <span id="btnText">분석 시작</span>
    </button>
  </div>
  <div class="hdr-meta">
    <span class="badge" id="mktBadge">KRX 시장감시</span>
    <span class="badge" id="updBadge">v2.0</span>
    <span class="badge">⏰ 평일 07:30 알람</span>
  </div>
  <div class="prog-wrap" id="progWrap" style="display:none">
    <div class="prog-fill" id="progFill" style="width:0%"></div>
  </div>
</div>

<div class="main" id="main">

  <!-- ✦ 대시보드 진입 대기 첫 화면 ✦ -->
  <div class="start" id="startView">
    <div class="spinner"></div>
    <div class="ld-title" style="font-size: 16px; margin-bottom: 8px;">고급 인공지능 분석 시스템 대기 중</div>
    <div class="ld-sub">상단의 [분석 시작] 버튼을 터치하시면<br>실시간 백엔드 데이터 엔진과 연동을 시작합니다.</div>
  </div>

</div>

<script>
// 클로드가 설계한 첫 화면 작동용 기본 스크립트 고정
function startAnalysis() {
    const btn = document.getElementById('mainBtn');
    const wrap = document.getElementById('progWrap');
    const fill = document.getElementById('progFill');
    const startView = document.getElementById('startView');
    
    btn.disabled = true;
    document.getElementById('btnText').innerText = "연동 중...";
    document.getElementById('btnIcon').className = "spin";
    wrap.style.display = "block";
    
    let width = 0;
    const interval = setInterval(() => {
        if(width >= 100) {
            clearInterval(interval);
            document.getElementById('btnText').innerText = "가동 완료";
            document.getElementById('btnIcon').className = "";
            startView.innerHTML = `
                <div class="err-box" style="background:#0a101d; border-color:var(--blue)">
                    <div class="err-title" style="color:var(--blue)">✅ 동기화 성공</div>
                    <div class="err-msg" style="color:#aabbcc">클라우드 데이터 엔진과 성공적으로 연결되었습니다. 이제 파이썬 파일(cloud_engine.py)이 전달하는 데이터가 이 자리에 실시간 카드로 표출됩니다.</div>
                </div>`;
        } else {
            width += 10;
            fill.style.width = width + "%";
        }
    }, 150);
}
</script>

</body>
</html>
