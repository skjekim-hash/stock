<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>네이버 API CORS 테스트</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#03060f;color:#e0e6f0;padding:20px;line-height:1.6}
  h1{font-size:18px;color:#00e5a0}
  .test{background:#0a1020;border:1px solid #1a2540;border-radius:10px;padding:14px;margin:12px 0}
  .test h2{font-size:14px;margin:0 0 8px;color:#00d4ff}
  .ok{color:#00e5a0;font-weight:700}
  .fail{color:#ff4060;font-weight:700}
  pre{background:#050810;padding:10px;border-radius:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
  button{background:#00e5a0;color:#03060f;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:14px;margin:8px 0}
</style>
</head>
<body>
<h1>📡 네이버 API CORS 테스트</h1>
<p style="font-size:12px;color:#8090b0">이 페이지를 GitHub Pages에 올린 후 열어서, 브라우저가 네이버 API를 직접 호출할 수 있는지 확인합니다. 삼성전자(005930)로 테스트합니다.</p>
<button onclick="runTests()">테스트 시작</button>

<div class="test">
  <h2>① m.stock.naver.com /price (직접 호출)</h2>
  <div id="r1">대기 중...</div>
</div>
<div class="test">
  <h2>② m.stock.naver.com /basic (직접 호출)</h2>
  <div id="r2">대기 중...</div>
</div>
<div class="test">
  <h2>③ api.stock.naver.com (직접 호출)</h2>
  <div id="r3">대기 중...</div>
</div>
<div class="test">
  <h2>④ allorigins 프록시 경유</h2>
  <div id="r4">대기 중...</div>
</div>

<script>
async function test(url, elId){
  const el=document.getElementById(elId);
  el.innerHTML="요청 중...";
  try{
    const res=await fetch(url);
    if(!res.ok){ el.innerHTML=`<span class='fail'>✗ HTTP ${res.status}</span>`; return; }
    const txt=await res.text();
    let preview=txt.slice(0,300);
    el.innerHTML=`<span class='ok'>✓ 성공! CORS 통과</span><pre>${preview.replace(/</g,'&lt;')}</pre>`;
  }catch(e){
    el.innerHTML=`<span class='fail'>✗ 실패: ${e.message}</span><br><span style='font-size:11px;color:#8090b0'>(CORS 차단 가능성 높음)</span>`;
  }
}

async function runTests(){
  const code="005930";
  await test(`https://m.stock.naver.com/api/stock/${code}/price?pageSize=2&page=1`, "r1");
  await test(`https://m.stock.naver.com/api/stock/${code}/basic`, "r2");
  await test(`https://api.stock.naver.com/stock/${code}/basic`, "r3");
  const proxyUrl="https://api.allorigins.win/raw?url="+encodeURIComponent(`https://m.stock.naver.com/api/stock/${code}/basic`);
  await test(proxyUrl, "r4");
}
</script>
</body>
</html>
