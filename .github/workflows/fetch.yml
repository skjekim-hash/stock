name: 주식 데이터 자동 수집

on:
  schedule:
    # KST 08:00~20:00 전체 커버 (1분 간격)
    - cron: '* 23 * * 0-4'
    - cron: '* 0-11 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 주식 데이터 수집
        run: python fetch_stocks.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "StockBot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 주가 업데이트"
          git push
