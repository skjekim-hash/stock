name: 주식 데이터 자동 수집

on:
  # 갱신 트리거는 외부 스케줄러(cron-job.org)가 5분마다 workflow_dispatch로 호출함
  # GitHub 자체 schedule cron은 부하 시 지연·스킵이 잦아 제거하고 외부 트리거로 일원화
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 주식 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KIS_REAL: ${{ secrets.KIS_REAL }}
        run: python fetch_stocks.py

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name "StockBot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 주가 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
