name: 주식 데이터 자동 수집

on:
  # 갱신 트리거는 외부 스케줄러(cron-job.org)가 5분마다 workflow_dispatch로 호출함
  # GitHub 자체 schedule cron은 부하 시 지연·스킵이 잦아 제거하고 외부 트리거로 일원화
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 주식 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KIS_REAL: ${{ secrets.KIS_REAL }}
        run: python fetch_stocks.py

      - name: data.json 커밋 & 푸시
        # ⚠️ 이전 방식(reset --soft)은 체크아웃 시점의 전체 파일을 커밋해서,
        #    실행 도중 사용자가 올린 index.html 등을 옛 버전으로 되돌리는 버그가 있었음.
        #    새 방식: 항상 '지금 이 순간의 최신 main' 위에 data.json 한 파일만 얹어 커밋.
        run: |
          git config user.name "StockBot"
          git config user.email "bot@github.com"
          # 방금 생성된 data.json을 안전한 곳에 보관
          cp data.json /tmp/data.json
          # 푸시 경합(5분 주기 + 사용자 업로드) 대비 최대 3회 재시도
          for i in 1 2 3; do
            git fetch origin main
            # 최신 main으로 워킹트리·인덱스 완전 동기화 — 사용자가 올린 파일 그대로 유지됨
            git checkout -B main origin/main
            cp /tmp/data.json data.json
            git add data.json
            if git diff --staged --quiet; then
              echo "data.json 변경 없음 — 커밋 생략"
              exit 0
            fi
            git commit -m "📊 주가 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
            if git push origin main; then
              echo "푸시 완료"
              exit 0
            fi
            echo "푸시 경합 발생 — 재시도 ($i/3)"
            sleep 3
          done
          echo "3회 재시도 후에도 푸시 실패"
          exit 1
