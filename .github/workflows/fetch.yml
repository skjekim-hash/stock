name: 주식 데이터 자동 수집

on:
  schedule:
    # KST 08:00~20:00 커버 (5분 간격)
    # 1분(*) 간격은 GitHub이 부하 시 자주 스킵 → 5분(*/5)이 더 안정적으로 실행됨
    # UTC 기준: 23시(=KST 08시)는 일~목, 0~11시(=KST 09~20시)는 월~금
    - cron: '*/5 23 * * 0-4'
    - cron: '*/5 0-11 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 주식 데이터 수집
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KIS_REAL: ${{ secrets.KIS_REAL }}
        run: python fetch_stocks.py

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name "StockBot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📊 주가 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
